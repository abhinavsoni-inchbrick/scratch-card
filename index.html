<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Inch & Brick Realty — Scratch to reveal the winner!" />
  <title>Inch & Brick Realty — Scratch Card</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="top-bar"></div>
  <canvas id="confetti" aria-hidden="true"></canvas>
  <div class="flash-overlay" id="flashOverlay" aria-hidden="true"></div>

  <main class="card-wrapper">
    <article class="scratch-card" id="scratchCard">
      <header class="card-header">
        <img
          src="https://cdn.inchbrick.com/common/logo.png"
          width="150"
          height="40"
          alt="Inch & Brick Realty"
          class="brand-logo"
        />
        <p class="brand-sub">Inch &amp; Brick Realty</p>
        <h1 class="congrats">Congratulations!</h1>
        <div class="gold-rule"></div>
        <p class="label-top">Guess on Closing</p>
      </header>

      <section class="card-body">
        <div class="scratch-zone" id="scratchZone">
          <div class="reveal-layer">
            <div class="sparkle-ring" id="sparkleRing" aria-hidden="true"></div>
            <span class="reveal-label">Winner</span>
            <div class="winner-name" id="winnerName">DARAAB</div>
            <p class="reveal-sub">You did it!</p>
          </div>
          <canvas id="scratchCanvas" aria-label="Scratch here to reveal the winner"></canvas>
          <div class="scratch-hint" id="scratchHint">
            <span class="hint-icon">?</span>
            <span class="hint-text">Scratch to Reveal</span>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="progress-text" id="progressText">0% revealed</span>
        </div>

        <p class="tagline">Discipline · Trust · System · You Did It</p>
      </section>

      <footer class="card-footer">
        <span>Team Inch &amp; Brick Realty</span>
      </footer>
    </article>

    <button class="reset-btn hidden" id="resetBtn" type="button">Scratch Again</button>
  </main>

  <div class="bottom-bar"></div>
  <script src="js/scratch.js"></script>
</body>
</html>
